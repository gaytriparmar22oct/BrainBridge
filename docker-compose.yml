services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  model_init:
    image: curlimages/curl:8.8.0
    container_name: ollama-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
    command:
      - "-X"
      - "POST"
      - "http://ollama:11434/api/pull"
      - "-H"
      - "Content-Type: application/json"
      - "-d"
      - '{"name":"${OLLAMA_MODEL:-qwen3:8b}"}'

  open_webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "False"
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    restart: unless-stopped

  task_agent:
    build:
      context: ./agent
    container_name: ollama-task-agent
    depends_on:
      ollama:
        condition: service_healthy
      model_init:
        condition: service_started
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      TASK_INBOX_DIR: /app/tasks/inbox
      TASK_OUTBOX_DIR: /app/tasks/outbox
      TASK_ARCHIVE_DIR: /app/tasks/archive
      TASK_WORKSPACE_DIR: /app/tasks/workspace
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-3}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-180}
      MAX_AGENT_LOOPS: ${MAX_AGENT_LOOPS:-10}
      OLLAMA_KEEP_ALIVE: "24h"
    volumes:
      - ./tasks:/app/tasks
    restart: unless-stopped

volumes:
  ollama_data:
  open_webui_data:
